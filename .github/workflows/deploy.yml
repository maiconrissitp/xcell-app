name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout do código
        uses: actions/checkout@v4

      - name: 🟢 Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🛠️ Instalar dependências e Gerar Build
        run: |
          npm install
          npm run build

      - name: 📝 Ajustar HTML (Título, Ícone e Caminhos)
        run: |
          node -e "
          const fs = require('fs');
          const path = 'dist/index.html';
          if (fs.existsSync(path)) {
            let html = fs.readFileSync(path, 'utf8');
            
            // 1. Corrige caminhos para caminhos relativos
            html = html.replace(/\"\/assets/g, '\"./assets');
            
            // 2. Altera o Título do Sistema
            html = html.replace(/<title>.*?<\/title>/, '<title>XCell</title>');
            
            // 3. Adiciona as duas tags de ícone exatamente como solicitado
            // Elas serão inseridas logo antes do fechamento da tag </head>
            const iconTags = '\n    <link rel=\"apple-touch-icon\" href=\"icone.png\">\n    <link rel=\"icon\" type=\"image/png\" href=\"icone.png\">\n  </head>';
            html = html.replace('</head>', iconTags);
            
            fs.writeFileSync(path, html);
            console.log('✅ Tags de ícone inseridas com sucesso!');
          }
          "

      - name: 📤 Upload do resultado
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: 🚀 Publicar no GitHub Pages
        uses: actions/deploy-pages@v4
